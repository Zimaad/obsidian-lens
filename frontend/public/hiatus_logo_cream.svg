  <text x="340" y="236" text-anchor="middle" font-family="'Inter', sans-serif" font-size="9" letter-spacing="2" style="fill:rgb(74, 69, 64);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Inter, sans-serif;font-size:9px;font-weight:400;text-anchor:middle;dominant-baseline:auto">compact</text>

